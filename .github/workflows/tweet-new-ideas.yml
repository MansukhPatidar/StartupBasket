name: Tweet new ideas

on:
  push:
    paths:
      - 'ideas/*/proposal.md'
    branches: [main]
  workflow_dispatch:

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Tweet new ideas
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          # Find idea folders added in the latest commit
          NEW_IDEAS=$(git diff --name-only HEAD~1 HEAD -- ideas/ \
            | grep 'proposal.md$' \
            | sed 's|/proposal.md$||' \
            | sort -u)

          if [ -z "$NEW_IDEAS" ]; then
            echo "No new ideas to tweet"
            exit 0
          fi

          for folder in $NEW_IDEAS; do
            echo "Tweeting: $folder"
            node scripts/tweet-idea.mjs "$folder" || true
            sleep 2
          done
